name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: docker-image
          key: docker-${{ hashFiles('Dockerfile') }}

      - name: Load image
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i docker-image/image.tar

      - name: Build image
        if: steps.cache-docker.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: sysveil-ebpf-builder
          platforms: linux/amd64
          cache-from: |
            type=gha,scope=sysveil-ebpf-builder
            type=gha
          cache-to: type=gha,mode=max,scope=sysveil-ebpf-builder
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save image to cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          mkdir -p docker-image
          docker save sysveil-ebpf-builder -o docker-image/image.tar

      - name: Build project
        run: docker compose run --rm builder cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-linux-x86_64
          path: target/x86_64-unknown-linux-gnu/release/app
